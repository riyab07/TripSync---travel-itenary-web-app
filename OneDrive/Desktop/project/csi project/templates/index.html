<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FoodEye - Food Item Tracker</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1e1e2f 0%, #2a2a4e 100%);
      margin: 0;
      padding: 20px;
      color: #e0e0e0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .container {
      background: #2a2a4e;
      padding: 25px 35px;
      border-radius: 12px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .container:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
    }
    h1, h2 {
      text-align: center;
      color: #00ddeb;
      text-shadow: 0 0 8px rgba(0, 221, 235, 0.5);
      margin: 10px 0;
    }
    video {
      border-radius: 12px;
      border: 3px solid #ff6b6b;
      display: block;
      margin: 0 auto 15px auto;
      width: 100%;
      max-width: 320px;
      height: auto;
      box-shadow: 0 4px 12px rgba(255, 107, 107, 0.3);
      transition: transform 0.3s ease;
    }
    video:hover {
      transform: scale(1.02);
    }
    #result {
      text-align: center;
      margin: 15px 0 25px 0;
      font-weight: 600;
      color: #00ff88;
      text-shadow: 0 0 6px rgba(0, 255, 136, 0.5);
      font-size: 1.1rem;
    }
    button {
      cursor: pointer;
      background: linear-gradient(45deg, #ff6b6b, #ff8e53);
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      color: white;
      margin: 10px 5px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.3s ease;
      font-weight: 600;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(255, 107, 107, 0.4);
      background: linear-gradient(45deg, #ff8e53, #ff6b6b);
    }
    button:active {
      transform: translateY(0);
      box-shadow: 0 2px 6px rgba(255, 107, 107, 0.2);
    }
    a.button {
      cursor: pointer;
      background: linear-gradient(45deg, #ff6b6b, #ff8e53);
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 1rem;
      color: white;
      margin: 10px 5px;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.3s ease;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
    }
    a.button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(255, 107, 107, 0.4);
      background: linear-gradient(45deg, #ff8e53, #ff6b6b);
    }
    a.button:active {
      transform: translateY(0);
      box-shadow: 0 2px 6px rgba(255, 107, 107, 0.2);
    }
    form {
      margin-top: 30px;
    }
    .form-group {
      margin-bottom: 20px;
      position: relative;
    }
    label {
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
      color: #00ddeb;
      font-size: 0.95rem;
      transition: color 0.3s ease;
    }
    input[type="text"],
    input[type="number"],
    input[type="date"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 1rem;
      border: 2px solid #3e3e6b;
      border-radius: 8px;
      outline: none;
      background: #1e1e2f;
      color: #e0e0e0;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    input[type="text"]:focus,
    input[type="number"]:focus,
    input[type="date"]:focus {
      border-color: #00ddeb;
      box-shadow: 0 0 8px rgba(0, 221, 235, 0.4);
    }
    input::placeholder {
      color: #6b7280;
      opacity: 0.8;
    }
    ul {
      list-style: none;
      padding-left: 0;
      margin-top: 20px;
    }
    ul li {
      background: #3e3e6b;
      padding: 12px 15px;
      margin-bottom: 10px;
      border-radius: 8px;
      font-weight: 500;
      color: #e0e0e0;
      transition: transform 0.2s ease, background 0.3s ease;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    ul li:hover {
      transform: translateX(5px);
      background: #4e4e8e;
    }
    .button-group {
      text-align: center;
      margin-top: 25px;
      display: flex;
      justify-content: center;
      gap: 10px;
    }
    .tooltip {
      position: relative;
      display: inline-block;
    }
    .tooltip .tooltiptext {
      visibility: hidden;
      width: 120px;
      background: #2a2a4e;
      color: #e0e0e0;
      text-align: center;
      border-radius: 6px;
      padding: 5px;
      position: absolute;
      z-index: 1;
      bottom: 125%;
      left: 50%;
      margin-left: -60px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .tooltip:hover .tooltiptext {
      visibility: visible;
      opacity: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>FoodEye - Food Item Tracker</h1>

    <!-- Webcam Section -->
    <video id="video" autoplay></video>
    <div class="button-group">
      <button id="snap" class="tooltip">Capture & Detect Food<span class="tooltiptext">Take a photo to identify food</span></button>
    </div>
    <canvas id="canvas" width="320" height="240" style="display:none;"></canvas>
    <div id="result"></div>

    <!-- Inventory Form -->
    <form novalidate>
      <div class="form-group">
        <label for="itemId">Item ID</label>
        <input type="text" id="itemId" placeholder="Enter item ID" required autocomplete="off" />
      </div>
      <div class="form-group">
        <label for="itemName">Item Name</label>
        <input type="text" id="itemName" placeholder="Enter item name" required autocomplete="off" />
      </div>
      <div class="form-group">
        <label for="itemQty">Quantity</label>
        <input type="number" id="itemQty" placeholder="Enter quantity" required min="1" autocomplete="off" />
      </div>
      <div class="form-group">
        <label for="itemStorage">Storage (fridge, pantry, freezer)</label>
        <input type="text" id="itemStorage" placeholder="Enter storage type" required autocomplete="off" />
      </div>
      <div class="form-group">
        <label for="expiryDate">Expiry Date</label>
        <input type="date" id="expiryDate" required />
      </div>
      <div class="button-group">
        <button type="button" onclick="addItem()" class="tooltip">Add Item<span class="tooltiptext">Add to inventory</span></button>
        <button type="button" onclick="toggleSort()" class="tooltip">Sort by Expiry<span class="tooltiptext">Sort items by expiry date</span></button>
        <button type="button" onclick="clearAll()" class="tooltip">Clear All<span class="tooltiptext">Remove all items</span></button>
        <a href="landing.html" class="button tooltip">Back to Home<span class="tooltiptext">Return to FoodEye home</span></a>
      </div>
    </form>

    <!-- Inventory List -->
    <h2>Inventory</h2>
    <ul id="itemList"></ul>
  </div>

  <script>
    // Webcam Setup
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const snapBtn = document.getElementById('snap');
    const resultDiv = document.getElementById('result');

    navigator.mediaDevices.getUserMedia({ video: true })
      .then(stream => {
        video.srcObject = stream;
      })
      .catch(err => {
        console.error("Webcam error:", err);
        resultDiv.textContent = "Cannot access webcam.";
      });

    snapBtn.addEventListener('click', () => {
      const ctx = canvas.getContext('2d');
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
      canvas.toBlob(blob => {
        if (!blob) {
          resultDiv.textContent = "Failed to capture image.";
          return;
        }
        const formData = new FormData();
        formData.append('image', blob, 'snapshot.png');

        fetch('/detect-food', {
          method: 'POST',
          body: formData
        })
          .then(res => res.json())
          .then(data => {
            if (data.error) {
              resultDiv.style.color = '#ff6b6b';
              resultDiv.textContent = "Error: " + data.error;
            } else {
              resultDiv.style.color = '#00ff88';
              resultDiv.textContent = data.message;
              // Optionally, add detected item to inventory display
              if (data.item) {
                items.push(data.item);
                renderItems();
              }
            }
          })
          .catch(err => {
            console.error("Fetch error:", err);
            resultDiv.style.color = '#ff6b6b';
            resultDiv.textContent = "Failed to detect food.";
          });
      }, 'image/png');
    });

    // Inventory logic
    let items = [];
    let sortByExpiry = false;

    function addItem() {
      const id = document.getElementById('itemId').value.trim();
      const name = document.getElementById('itemName').value.trim();
      const qty = parseInt(document.getElementById('itemQty').value);
      const storage = document.getElementById('itemStorage').value.trim();
      const expiry = document.getElementById('expiryDate').value;

      if (!id || !name || !qty || !storage || !expiry) {
        alert('Please fill in all fields');
        return;
      }

      items.push({ id, name, qty, storage, expiry });

      // Clear inputs
      document.getElementById('itemId').value = '';
      document.getElementById('itemName').value = '';
      document.getElementById('itemQty').value = '';
      document.getElementById('itemStorage').value = '';
      document.getElementById('expiryDate').value = '';

      renderItems();
    }

    function renderItems() {
      const list = document.getElementById('itemList');
      list.innerHTML = '';

      let displayItems = [...items];
      if (sortByExpiry) {
        displayItems.sort((a, b) => new Date(a.expiry) - new Date(b.expiry));
      }

      displayItems.forEach(item => {
        const li = document.createElement('li');
        li.textContent = `${item.name} (Qty: ${item.qty}) - Expires: ${item.expiry} - Storage: ${item.storage}`;
        list.appendChild(li);
      });
    }

    function toggleSort() {
      sortByExpiry = !sortByExpiry;
      renderItems();
    }

    function clearAll() {
      if (confirm('Are you sure you want to clear all items?')) {
        items = [];
        renderItems();
      }
    }

    renderItems();
  </script>
</body>
</html>
